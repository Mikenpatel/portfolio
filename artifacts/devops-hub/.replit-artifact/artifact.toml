kind = "web"
previewPath = "/"
title = "DevOps Tools Hub"
version = "1.0.0"
id = "artifacts/devops-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18855

[services.development]
run = "pnpm --filter @workspace/devops-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/devops-hub", "run", "build" ]
publicDir = "artifacts/devops-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18855"
BASE_PATH = "/"
